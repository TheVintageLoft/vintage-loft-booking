<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>Import holiday holds</title>
<style>
  body{font-family:Georgia,serif;color:#3a352f;background:#eeedec;margin:0;padding:24px}
  .card{max-width:820px;margin:0 auto;background:#fff;border:1px solid #e7e5e2;border-radius:14px;overflow:hidden}
  .hd{background:#f6f5f3;border-bottom:2px solid #7c7268;padding:22px 26px}
  .hd h1{margin:0;font-size:22px;font-weight:normal}.hd p{margin:6px 0 0;font-family:Arial,sans-serif;font-size:13px;color:#8a8375}
  .body{padding:22px 26px}
  .sum{font-family:Arial,sans-serif;font-size:14px;background:#f6f5f3;border-radius:10px;padding:12px 16px;margin-bottom:16px}
  .row{display:flex;gap:10px;align-items:center;margin:14px 0}
  input{font-family:Arial,sans-serif;font-size:15px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;flex:1}
  button{font-family:Arial,sans-serif;font-size:15px;font-weight:bold;background:#7c7268;color:#fff;border:0;border-radius:8px;padding:11px 22px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  #msg{font-family:Arial,sans-serif;font-size:14px;margin-top:14px;padding:12px 14px;border-radius:8px;display:none}
  table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px;margin-top:12px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #f0eeeb}th{color:#8a8375;font-weight:normal;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
  .rm{text-transform:capitalize;font-weight:bold}
  details{margin-top:8px}summary{font-family:Arial,sans-serif;font-size:13px;color:#7c7268;cursor:pointer}
</style></head><body>
<div class="card">
  <div class="hd"><h1>Import holiday holds</h1><p>The Vintage Loft &mdash; block out the Christmas / New Year holidays on all studios (Holds, not public bookings)</p></div>
  <div class="body">
    <div class="sum" id="sum"></div>
    <div class="row">
      <input id="key" type="password" placeholder="Admin key (the ADMIN_KEY from your Render settings)">
      <button id="go">Add these holds</button>
    </div>
    <div id="msg"></div>
    <details><summary>Review the holds before importing</summary>
      <table id="tbl"><thead><tr><th>Date</th><th>Studio</th><th>Time</th><th>For</th></tr></thead><tbody></tbody></table>
    </details>
  </div>
</div>
<script>
var BLOCKS = [{"room": "grand", "date": "2026-12-23", "start": 8, "end": 20, "reason": "Christmas closure"}, {"room": "gatsby", "date": "2026-12-23", "start": 8, "end": 20, "reason": "Christmas closure"}, {"room": "carnegie", "date": "2026-12-23", "start": 8, "end": 20, "reason": "Christmas closure"}, {"room": "dream", "date": "2026-12-23", "start": 8, "end": 20, "reason": "Christmas closure"}, {"room": "marilyn", "date": "2026-12-23", "start": 8, "end": 20, "reason": "Christmas closure"}, {"room": "grand", "date": "2026-12-24", "start": 8, "end": 20, "reason": "Christmas Eve"}, {"room": "gatsby", "date": "2026-12-24", "start": 8, "end": 20, "reason": "Christmas Eve"}, {"room": "carnegie", "date": "2026-12-24", "start": 8, "end": 20, "reason": "Christmas Eve"}, {"room": "dream", "date": "2026-12-24", "start": 8, "end": 20, "reason": "Christmas Eve"}, {"room": "marilyn", "date": "2026-12-24", "start": 8, "end": 20, "reason": "Christmas Eve"}, {"room": "grand", "date": "2026-12-25", "start": 8, "end": 20, "reason": "Christmas Day"}, {"room": "gatsby", "date": "2026-12-25", "start": 8, "end": 20, "reason": "Christmas Day"}, {"room": "carnegie", "date": "2026-12-25", "start": 8, "end": 20, "reason": "Christmas Day"}, {"room": "dream", "date": "2026-12-25", "start": 8, "end": 20, "reason": "Christmas Day"}, {"room": "marilyn", "date": "2026-12-25", "start": 8, "end": 20, "reason": "Christmas Day"}, {"room": "grand", "date": "2026-12-26", "start": 8, "end": 20, "reason": "Boxing Day"}, {"room": "gatsby", "date": "2026-12-26", "start": 8, "end": 20, "reason": "Boxing Day"}, {"room": "carnegie", "date": "2026-12-26", "start": 8, "end": 20, "reason": "Boxing Day"}, {"room": "dream", "date": "2026-12-26", "start": 8, "end": 20, "reason": "Boxing Day"}, {"room": "marilyn", "date": "2026-12-26", "start": 8, "end": 20, "reason": "Boxing Day"}, {"room": "grand", "date": "2026-12-31", "start": 8, "end": 20, "reason": "New Year's Eve"}, {"room": "gatsby", "date": "2026-12-31", "start": 8, "end": 20, "reason": "New Year's Eve"}, {"room": "carnegie", "date": "2026-12-31", "start": 8, "end": 20, "reason": "New Year's Eve"}, {"room": "dream", "date": "2026-12-31", "start": 8, "end": 20, "reason": "New Year's Eve"}, {"room": "marilyn", "date": "2026-12-31", "start": 8, "end": 20, "reason": "New Year's Eve"}, {"room": "grand", "date": "2027-01-01", "start": 8, "end": 20, "reason": "New Year's Day"}, {"room": "gatsby", "date": "2027-01-01", "start": 8, "end": 20, "reason": "New Year's Day"}, {"room": "carnegie", "date": "2027-01-01", "start": 8, "end": 20, "reason": "New Year's Day"}, {"room": "dream", "date": "2027-01-01", "start": 8, "end": 20, "reason": "New Year's Day"}, {"room": "marilyn", "date": "2027-01-01", "start": 8, "end": 20, "reason": "New Year's Day"}, {"room": "grand", "date": "2027-01-02", "start": 8, "end": 11, "reason": "New Year's - open after 11am"}, {"room": "gatsby", "date": "2027-01-02", "start": 8, "end": 11, "reason": "New Year's - open after 11am"}, {"room": "carnegie", "date": "2027-01-02", "start": 8, "end": 11, "reason": "New Year's - open after 11am"}, {"room": "dream", "date": "2027-01-02", "start": 8, "end": 11, "reason": "New Year's - open after 11am"}, {"room": "marilyn", "date": "2027-01-02", "start": 8, "end": 11, "reason": "New Year's - open after 11am"}];
function t(d){var h=Math.floor(d),m=Math.round((d-h)*60),ap=h<12?'AM':'PM',hh=h%12||12;return hh+':'+String(m).padStart(2,'0')+' '+ap;}
function fdate(iso){var p=iso.split('-'),M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[+p[1]-1]+' '+(+p[2])+', '+p[0];}
(function(){
  var days={}; BLOCKS.forEach(function(b){days[b.date]=1;});
  document.getElementById('sum').innerHTML='<b>'+BLOCKS.length+' holds</b> across <b>'+Object.keys(days).length+' dates</b>, all 5 studios. These block the whole day (New Year&rsquo;s Day Jan 2 is blocked only until 11 AM).';
  var tb=document.querySelector('#tbl tbody');
  BLOCKS.slice().sort(function(a,b){return (a.date+String(a.start).padStart(5,'0'))<(b.date+String(b.start).padStart(5,'0'))?-1:1;}).forEach(function(b){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+fdate(b.date)+'</td><td class="rm">'+b.room+'</td><td>'+t(b.start)+' &ndash; '+t(b.end)+'</td><td>'+(b.reason||'')+'</td>';
    tb.appendChild(tr);
  });
})();
document.getElementById('go').onclick=function(){
  var key=document.getElementById('key').value.trim();
  var msg=document.getElementById('msg'); msg.style.display='block';
  if(!key){msg.style.background='#fdecea';msg.style.color='#a33';msg.textContent='Please enter your admin key first.';return;}
  var btn=this; btn.disabled=true; btn.textContent='Adding\u2026';
  msg.style.background='#f6f5f3';msg.style.color='#3a352f';msg.textContent='Adding '+BLOCKS.length+' holds\u2026';
  fetch('/api/admin/import-blocks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,blocks:BLOCKS,kind:'hold'})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(x){
      btn.disabled=false;btn.textContent='Add these holds';
      if(!x.ok){msg.style.background='#fdecea';msg.style.color='#a33';msg.textContent=(x.d&&x.d.error)||'Failed - check your admin key.';return;}
      msg.style.background='#eaf5ec';msg.style.color='#2e6b34';
      msg.innerHTML='<b>Done!</b> Added '+x.d.inserted+' holds. '+(x.d.skipped?('Skipped '+x.d.skipped+' already there. '):'')+(x.d.bad?('('+x.d.bad+' skipped as invalid.)'):'');
    })
    .catch(function(e){btn.disabled=false;btn.textContent='Add these holds';msg.style.background='#fdecea';msg.style.color='#a33';msg.textContent='Network error: '+e.message;});
};
</script></body></html>
