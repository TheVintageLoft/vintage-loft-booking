function fdate(iso){var p=iso.split('-'),M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[+p[1]-1]+' '+(+p[2])+', '+p[0];}
(function(){

  BLOCKS.slice().sort(function(a,b){return (a.date+a.start)<(b.date+b.start)?-1:1;}).forEach(function(b){

    tr.innerHTML='<td>'+fdate(b.date)+'</td><td class="rm">'+b.room+'</td><td>'+t(b.start)+' – '+t(b.end)+'</td><td>'+(b.reason||'')+'</td>';

document.getElementById('go').onclick=function(){
  var key=document.getElementById('key').value.trim();
  var msg=document.getElementById('msg'); msg.style.display='block';
  if(!key){msg.style.background='#fdecea';msg.style.color='#a33';msg.textContent='Please enter your admin key first.';return;}
  var btn=this; btn.disabled=true; btn.textContent='Importing…';
  msg.style.background='#f6f5f3';msg.style.color='#3a352f';msg.textContent='Importing '+BLOCKS.length+' blocks…';
  fetch('/api/admin/import-blocks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,blocks:BLOCKS})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})

      btn.disabled=false;btn.textContent='Import all';
      if(!x.ok){msg.style.background='#fdecea';msg.style.color='#a33';msg.textContent=(x.d&&x.d.error)||'Import failed — check your admin key.';return;}
